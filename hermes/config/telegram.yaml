# Telegram integration config
# Supergroup: Hermes PI
#
# Topic IDs are real Telegram message_thread_id values.
# Verified: 2026-05-25

telegram:
  # Supergroup ID (negative number)
  default_chat_id: -1003913424869

  topics:
    # #general — you → Hermes (delegation, quick asks)
    general: 173

    # #projects — Hermes → you (cron results, status updates, autonomous output)
    projects: 167

    # #finance — finance queries and balance checks (bidirectional)
    finance: 1192

  routing:
    # Hermes replies to delegation in the same topic it received the message
    reply_in_thread: true
    # All proactive/scheduled output goes to #projects
    proactive_output_topic: projects
    # Urgent clarifications (blocking a task) go to #general
    urgent_clarification_topic: general

  # Multi-bot routing: when a message is explicitly directed at another bot
  # (e.g. /balance@sova_finance_bot), Hermes stays completely silent.
  # This prevents "Unknown command" responses for commands owned by @sova_finance_bot.
  # Add new bots to the group → they get the same treatment automatically.
  extra:
    exclusive_bot_mentions: true
